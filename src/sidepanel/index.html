<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLMeeting</title>

<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LLMeeting</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <div class="brand-row">
            <h1>LLMeeting</h1>
            <span id="planBadge" class="plan-badge">Free</span>
            <span class="version-badge">v0.4.2</span>
          </div>
          <p id="statusText">等待開始</p>
        </div>
        <button id="resetButton" type="button" title="重置">Reset</button>
      </header>

      <div class="main-content">
        <!-- 狀態進度條 -->
        <div id="progressContainer" class="progress-container">
          <div id="progressBar" class="progress-bar" style="width: 0%"></div>
        </div>

      <form id="debateForm" class="composer">
        <label for="questionInput" class="sr-only">問題</label>
        <textarea id="questionInput" rows="4" placeholder="輸入題目，或留空後從目前 AI 分頁總結..."></textarea>


        <!-- 進階自訂面板 -->
        <details class="settings-panel">
          <summary>⚙️ 進階辯論設定</summary>
          <div class="settings-content">
            <fieldset class="providers-fieldset">
              <legend>參與辯論的 AI</legend>
              <div class="checkbox-group">
                <label><input type="checkbox" class="provider-select" value="chatgpt" checked> ChatGPT</label>
                <label><input type="checkbox" class="provider-select" value="gemini" checked> Gemini</label>
                <label><input type="checkbox" class="provider-select" value="grok" checked> Grok</label>
                <label><input type="checkbox" class="provider-select" value="claude" checked> Claude</label>
              </div>
            </fieldset>

            <fieldset class="mode-fieldset">
              <legend>辯論模式</legend>
              <div class="mode-options">
                <label class="mode-option">
                  <input type="radio" class="debate-mode-select" name="debateMode" value="basic" checked>
                  <span>基礎辯論</span>
                </label>
                <label class="mode-option" data-pro-feature="fastDebate">
                  <input type="radio" class="debate-mode-select" name="debateMode" value="fast">
                  <span>快速鬥技場 ⚡ <span class="pro-pill">PRO</span></span>
                </label>
                <label class="mode-option" data-pro-feature="chatMode">
                  <input type="radio" class="debate-mode-select" name="debateMode" value="chat">
                  <span>自由群聊 💬 <span class="pro-pill">PRO</span></span>
                </label>
                <label class="mode-option" data-pro-feature="chatMode">
                  <input type="radio" class="debate-mode-select" name="debateMode" value="theater">
                  <span>劇場大亂鬥 🎭 <span class="pro-pill">PRO</span></span>
                </label>
                <label class="mode-option" data-pro-feature="summaryDebate">
                  <input type="radio" class="debate-mode-select" name="debateMode" value="summary">
                  <span>總結辯論 ✦ <span class="pro-pill">PRO</span></span>
                </label>
              </div>
            </fieldset>
            
            <div class="setting-item">
              <label for="summaryProviderSelect">由誰擔任裁判總結：</label>
              <select id="summaryProviderSelect">
                <option value="chatgpt" selected>ChatGPT</option>
                <option value="gemini">Gemini</option>
                <option value="grok">Grok</option>
                <option value="claude">Claude</option>
              </select>
            </div>

            <div class="setting-item">
              <label><input type="checkbox" id="skipSummaryCheckbox"> 略過最後的總結裁決 (放空模式)</label>
            </div>

            <div class="setting-item compact-setting">
              <label for="debateRoundsInput">交叉評析輪次：</label>
              <input id="debateRoundsInput" type="number" min="1" max="5" step="1" value="1">
            </div>

            <!-- 互動風格設定 -->
            <div class="setting-item compact-setting" style="margin-top: 12px;">
              <label for="interactionStyleSelect">🎬 互動風格：</label>
              <select id="interactionStyleSelect" style="flex: 1;">
                <option value="critique">⚖️ 嚴肅互評 (預設)</option>
                <option value="casual">🍻 酒吧閒聊</option>
                <option value="brawl">🥊 無差別格鬥</option>
                <option value="yesand">🤝 共識接龍 (Yes, and...)</option>
                <option value="imposter">🕵️‍♂️ 抓內鬼模式</option>
              </select>
            </div>

            <!-- 劇場模式專用自定義人設 -->
            <div id="theaterSettings" style="display: none; margin-top: 12px; border-top: 1px solid #e5e7eb; padding-top: 12px;">
              <legend style="font-weight: 500; font-size: 0.875rem; color: #111827; margin-bottom: 8px;">🎭 自定義劇場人設</legend>
              <div style="display: flex; flex-direction: column; gap: 8px;">
                <div>
                  <label for="personaChatgpt" style="font-size: 0.75rem; color: #6b7280;">ChatGPT (預設: 正經分析)</label>
                  <textarea id="personaChatgpt" rows="2" style="width:100%; border-radius:4px; padding:4px; font-size:0.875rem;" placeholder="輸入 ChatGPT 的人設...">【強制人設】你現在負責「正經分析」，請專注於邏輯、可行性與全方位視角，提供正規嚴謹的建議。</textarea>
                </div>
                <div>
                  <label for="personaClaude" style="font-size: 0.75rem; color: #6b7280;">Claude (預設: 盲點揭露)</label>
                  <textarea id="personaClaude" rows="2" style="width:100%; border-radius:4px; padding:4px; font-size:0.875rem;" placeholder="輸入 Claude 的人設...">【強制人設】你現在負責「盲點揭露」，專門找漏洞、提出反常識思考與潛在風險，挑戰現有方案的合理性。</textarea>
                </div>
                <div>
                  <label for="personaGrok" style="font-size: 0.75rem; color: #6b7280;">Grok (預設: 效率吐槽)</label>
                  <textarea id="personaGrok" rows="2" style="width:100%; border-radius:4px; padding:4px; font-size:0.875rem;" placeholder="輸入 Grok 的人設...">【強制人設】你現在負責「效率吐槽」，講求極致效率，專門吐槽拖泥帶水的廢話和糟糕的架構，說話酸辣。</textarea>
                </div>
                <div>
                  <label for="personaGemini" style="font-size: 0.75rem; color: #6b7280;">Gemini (預設: 腦洞鬧場)</label>
                  <textarea id="personaGemini" rows="2" style="width:100%; border-radius:4px; padding:4px; font-size:0.875rem;" placeholder="輸入 Gemini 的人設...">【強制人設】你現在負責「腦洞鬧場」，專門提出荒謬創新但確有可行性觀點的創意怪咖，不受傳統思維限制。說話必須大量使用顏文字(如 ヾ(•ω•`)o 等等)，這才是你的靈魂！</textarea>
                </div>
              </div>
            </div>

            <!-- 分頁掛勾設定 -->
            <details id="tabHookingSettings" style="margin-top: 12px; border-top: 1px solid #e5e7eb; padding-top: 12px;">
              <summary style="font-weight: 500; font-size: 0.875rem; color: #111827; margin-bottom: 8px; cursor: pointer; outline: none;">🔗 指定連線分頁</summary>
              <div style="font-size: 0.75rem; color: #6b7280; margin-bottom: 8px;">展開以選擇要掛勾的分頁。若收起則會自動尋找或開新分頁。</div>
              <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px;">
                <div>
                  <label for="hookChatgpt" style="font-size: 0.75rem; font-weight: 600; color: #374151;">ChatGPT</label>
                  <select id="hookChatgpt" style="width: 100%; margin-top: 2px;">
                    <option value="">[自動] 尋找或開新分頁</option>
                  </select>
                </div>
                <div>
                  <label for="hookClaude" style="font-size: 0.75rem; font-weight: 600; color: #374151;">Claude</label>
                  <select id="hookClaude" style="width: 100%; margin-top: 2px;">
                    <option value="">[自動] 尋找或開新分頁</option>
                  </select>
                </div>
                <div>
                  <label for="hookGrok" style="font-size: 0.75rem; font-weight: 600; color: #374151;">Grok</label>
                  <select id="hookGrok" style="width: 100%; margin-top: 2px;">
                    <option value="">[自動] 尋找或開新分頁</option>
                  </select>
                </div>
                <div>
                  <label for="hookGemini" style="font-size: 0.75rem; font-weight: 600; color: #374151;">Gemini</label>
                  <select id="hookGemini" style="width: 100%; margin-top: 2px;">
                    <option value="">[自動] 尋找或開新分頁</option>
                  </select>
                </div>
              </div>
              <button type="button" id="refreshHooksBtn" style="margin-top: 8px; font-size: 0.75rem; padding: 4px 8px;">重新掃描分頁 🔄</button>
            </details>
          </div>
        </details>

        <!-- 互動聊天控制台 -->
        <details id="chatControls" class="chat-controls" style="margin-top: 12px; border: 1px solid #e5e7eb; padding: 12px; border-radius: 8px; background: #f9fafb;">
          <summary style="font-weight: 600; font-size: 0.875rem; color: #111827; cursor: pointer; outline: none;">💬 互動聊天 (展開以允許對話暫停)</summary>
          <div style="margin-top: 8px;">
            <textarea id="chatInput" rows="2" placeholder="使用者補充..." style="width:100%; border-radius:6px; padding:8px; font-family:inherit; border: 1px solid #d1d5db;"></textarea>
            <div class="chat-buttons" style="display:flex; gap:8px; margin-top:8px;">
              <button type="button" id="chatSendBtn" style="flex:1; padding:8px; background:#4f46e5; color:white; border:none; border-radius:6px; cursor:pointer;">送出補充</button>
              <button type="button" id="chatCritiqueBtn" style="flex:1; padding:8px; background:#e5e7eb; color:#374151; border:none; border-radius:6px; cursor:pointer;">讓 AI 互評</button>
              <button type="button" id="chatSummarizeBtn" style="flex:1; padding:8px; background:#f3f4f6; color:#374151; border:none; border-radius:6px; cursor:pointer;">結案總結</button>
            </div>
          </div>
        </details>

        <div class="action-row" style="display:flex; gap:8px;">
          <button id="basicDebateButton" class="primary-action" type="submit" style="flex:1;">基礎辯論</button>
          <button type="button" id="stopDebateBtn" style="display:none; padding:8px; background:#ef4444; color:white; border:none; border-radius:6px; cursor:pointer; font-weight:bold;">緊急暫停 🛑</button>
        </div>
      </form>

      <section class="status-grid" aria-label="Provider status">
        <article class="provider" data-provider="chatgpt">
          <span class="provider-badge chatgpt">GPT</span>
          <strong id="chatgptState">待命</strong>
        </article>
        <article class="provider" data-provider="gemini">
          <span class="provider-badge gemini">Gemini</span>
          <strong id="geminiState">待命</strong>
        </article>
        <article class="provider" data-provider="grok">
          <span class="provider-badge grok">Grok</span>
          <strong id="grokState">待命</strong>
        </article>
        <article class="provider" data-provider="claude">
          <span class="provider-badge claude">Claude</span>
          <strong id="claudeState">待命</strong>
        </article>
      </section>

      <section class="output">
        <h2>Transcript</h2>
        <!-- 氣泡對話框 Transcript -->
        <div id="chatTranscript" class="chat-transcript">
          <div class="empty-state">輸入問題跑基礎辯論。</div>
        </div>
        <pre id="transcriptOutput" style="display: none;">尚未開始</pre>
      </section>

      <details class="diagnostics-panel">
        <summary>診斷資訊</summary>
        <pre id="diagnosticsOutput">尚未開始</pre>
      </details>
      </div>
    </main>
    <script type="module" src="app.js"></script>
  </body>
</html>
